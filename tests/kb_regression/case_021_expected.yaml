verification_criteria:
  T_min: null
  T_max: null
  R_max: null
  TR_sum_min: "0.95"
  TR_sum_max: "1.05"
  FOM_threshold: null
  gradient_ratio_target: null
  no_exception: "True"
  description: "resolution과 수렴 조건 완화로 32 코어에서 타임아웃 없이 실행 완료되고 에너지 보존 법칙(T+R≈1)이 ±5% 이내로 만족되어야 합니다."
