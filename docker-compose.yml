version: "3.9"

services:
  meep-kb:
    build: .
    ports:
      - "8765:7860"
    env_file:
      - .env
    volumes:
      # DB 디렉토리 — 컨테이너 재시작해도 데이터 유지
      - ./db:/app/db
      # web/api 핫-리로드 — 로컬 편집이 컨테이너에 즉시 반영
      - ./web:/app/web
      - ./api:/app/api
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
