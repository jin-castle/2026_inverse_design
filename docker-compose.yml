version: "3.9"

services:
  meep-kb:
    build: .
    ports:
      - "8765:7860"
    env_file:
      - .env
    volumes:
      # DB는 호스트 폴더로 마운트 → 컨테이너 재시작해도 데이터 유지
      - ./db:/app/db
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
